<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified | Phi-Games 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a227;
            --gold-glow: rgba(201, 162, 39, 0.4);
            --navy: #0c1f33;
            --glass: rgba(20, 45, 76, 0.85);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #162e4a 0%, #0c1f33 100%);
            color: #f4f0e6;
            font-family: 'Libre Baskerville', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(201,162,39,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 2px;
            margin: 0 0 20px;
        }

        .receipt-container {
            background: rgba(0,0,0,0.3);
            border: 1px dashed var(--gold);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .code {
            font-family: monospace;
            font-size: 24px;
            color: var(--gold);
            font-weight: bold;
            margin: 10px 0;
        }

        .items-list {
            text-align: left;
            font-size: 14px;
            margin-top: 15px;
            border-top: 1px solid rgba(201,162,39,0.2);
            padding-top: 10px;
        }

        .primary-btn {
            padding: 15px 35px;
            background: var(--gold);
            color: var(--navy);
            border-radius: 8px;
            font-weight: 800;
            font-family: 'Cinzel', serif;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <h1 id="status-title">TRANSACTION VERIFIED</h1>
        <p id="main-msg">Thank you for your contribution.</p>

        <div id="receipt-box" class="receipt-container">
            <div style="font-size: 10px; opacity: 0.7; letter-spacing: 2px;">REDEEMABLE CODE</div>
            <div id="phi-code" class="code">PHI-LOADING</div>
            <div id="order-items" class="items-list"></div>
        </div>

        <a href="index.html" class="primary-btn">RETURN TO ARENA</a>
        <div style="margin-top:25px; font-size:12px; color:var(--gold);">Supporting Iron Phi & ALS Research</div>
    </div>

    <script>// 1. Setup Supabase (Use your public keys)
        const supabaseUrl = 'https://dlrjujkapopwovjqlpew.supabase.co';
        const supabaseKey = 'sb_publishable_sABzmRtrGXfuU1gYSxp_TQ_EADV6vwU'; // Your public key
        const _supabase = netlify.createClient(supabaseUrl, supabaseKey); // or however you initialized it

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const sessionId = urlParams.get('session_id');

        async function generateReceipt() {
            if (!sessionId) return;

            // Display the PHI-XXXX code immediately from the URL
            document.getElementById('phi-code').innerText = "PHI-" + sessionId.slice(-6).toUpperCase();

            if (type === 'food' || type === 'bundle') {
                document.getElementById('receipt-box').style.display = 'block';
                document.getElementById('status-title').innerText = "ORDER CONFIRMED";

                // 2. FETCH THE ACTUAL ITEMS FROM SUPABASE
                const { data, error } = await _supabase
                    .from('orders')
                    .select('items')
                    .eq('session_id', sessionId)
                    .single();

                if (data && data.items) {
                    const itemsList = data.items.map(item =>
                        `<div>• ${item.qty}x ${item.name}</div>`
                    ).join('');
                    document.getElementById('order-items').innerHTML = itemsList;
                } else {
                    document.getElementById('order-items').innerText = "Loading items...";
                }
            } else if (type === 'donation') {
                document.getElementById('status-title').innerText = "LEGACY DONOR";
                document.getElementById('main-msg').innerText = "Thanks for supporting the philanthropy!";
            }
        }

        generateReceipt();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#c9a227', '#ffffff'] });</script>
</body>
</html>
