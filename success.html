<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0c1f33;
            color: #f4f0e6;
            font-family: 'Libre Baskerville', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            background: rgba(20, 45, 76, 0.9);
            padding: 50px;
            border-radius: 15px;
            border: 2px solid #c9a227;
            max-width: 400px;
        }
        h1 { font-family: 'Cinzel'; color: #c9a227; margin: 0; }
        .code {
            font-family: monospace;
            font-size: 24px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin: 20px 0;
            border: 1px dashed #c9a227;
            color: #c9a227;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            color: #c9a227;
            text-decoration: underline;
            cursor: pointer;
            font-family: 'Cinzel';
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>RESERVATION SECURED</h1>
        <p>Your guest has been added to the official list.</p>
        <div class="code" id="ref-code">VERIFYING...</div>
        <p style="font-size: 13px; opacity: 0.8;">Please keep this screen for your records.</p>
        <div class="btn" onclick="window.location.href='index.html'">Return to Portal</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sid = params.get('session_id');
        if (sid) {
            document.getElementById('ref-code').innerText = "REF-" + sid.slice(-8).toUpperCase();
        }
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#c9a227', '#ffffff'] });
    </script>
</body>
</html>
