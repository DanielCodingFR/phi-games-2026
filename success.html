<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlisted | Phi-Games 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a227;
            --gold-glow: rgba(201, 162, 39, 0.4);
            --navy: #0c1f33;
            --glass: rgba(20, 45, 76, 0.85);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #162e4a 0%, #0c1f33 100%);
            color: #f4f0e6;
            font-family: 'Libre Baskerville', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .success-card {
            background: var(--glass);
            padding: 50px;
            border-radius: 15px;
            border: 1px solid rgba(201, 162, 39, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img {
            width: 80px;
            filter: drop-shadow(0 0 10px var(--gold-glow));
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 32px;
            margin: 0 0 15px;
            letter-spacing: 3px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .primary-btn {
            padding: 15px 35px;
            background: var(--gold);
            color: #0c1f33;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .philanthropy-note {
            margin-top: 25px;
            font-size: 12px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="success-card">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0b/Phi_Delta_Theta_Crest.png/250px-Phi_Delta_Theta_Crest.png" alt="Crest">
    <h1>PURCHASE COMPLETE</h1>
    <p>Thank you for donating.</p>
    
    <a href="index.html" class="primary-btn">RETURN TO BRACKET</a>

    <div class="philanthropy-note">Supporting Iron Phi & ALS Research</div>
</div>

</body>
</html>
