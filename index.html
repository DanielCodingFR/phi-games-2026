<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi-Games 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-glow: rgba(201, 162, 39, 0.4);
            --navy: #0c1f33;
            --glass: rgba(20, 45, 76, 0.85);
            --loser-op: 0.15;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #162e4a 0%, #0c1f33 100%);
            color: #f4f0e6;
            font-family: 'Libre Baskerville', serif;
            overflow-x: auto;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px;
        }

            header img {
                width: 60px;
                filter: drop-shadow(0 0 10px var(--gold-glow));
                margin-bottom: 10px;
            }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            margin: 0;
            color: var(--gold);
            cursor: pointer;
        }

        .sub-head {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            margin: 15px auto;
        }

        .card {
            background: var(--glass);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(201, 162, 39, 0.2);
        }

        /* VIEW SWITCHER TABS */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Cinzel';
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--gold);
            transition: 0.3s;
        }

        .tab-active {
            background: var(--gold);
            color: var(--navy);
        }

        .tab-inactive {
            background: transparent;
            color: var(--gold);
            opacity: 0.6;
        }

        /* LIVE FEED TICKER */
        .live-feed {
            grid-column: span 2;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--gold);
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid var(--gold-glow);
        }

        .ticker {
            display: inline-block;
            animation: ticker 25s linear infinite;
        }

        @keyframes ticker {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* PULSE DOT */
        .pulse-dot {
            height: 8px;
            width: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #ff4d4d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }
        }

        /* PROGRESS BAR */
        .progress-wrap {
            background: #081627;
            border-radius: 20px;
            height: 22px;
            border: 1px solid #1e3a5f;
            overflow: hidden;
            position: relative;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a6851e, #c9a227);
            transition: width 1.5s ease;
            box-shadow: 0 0 15px var(--gold);
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-weight: bold;
            font-size: 13px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        /* BRACKET & TEAMS */
        .bracket-container {
            grid-column: span 2;
            position: relative;
            padding: 40px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .bracket {
            display: inline-flex;
            gap: 80px;
            margin: 20px auto;
            position: relative;
            z-index: 5;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 20px;
        }

        .match {
            background: rgba(12, 31, 51, 0.7);
            border: 1px solid rgba(201, 162, 39, 0.1);
            padding: 12px;
            border-radius: 10px;
            width: 190px;
        }

        .team {
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            margin: 4px 0;
            border: 1px solid transparent;
            transition: 0.3s;
        }

            .team.winner-glow {
                color: var(--gold);
                border-color: var(--gold);
                background: rgba(201, 162, 39, 0.2);
                box-shadow: 0 0 10px var(--gold-glow);
            }

            .team.loser {
                opacity: var(--loser-op);
                filter: grayscale(1);
                pointer-events: none;
            }

        .player-count {
            display: block;
            font-size: 10px;
            opacity: 0.5;
            font-weight: normal;
            margin-top: 2px;
        }

        button.primary-btn {
            padding: 12px 24px;
            background: var(--gold);
            color: #0c1f33;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cinzel';
            transition: 0.2s;
        }

            button.primary-btn:hover {
                transform: scale(1.05);
                filter: brightness(1.1);
            }

        input, select {
            padding: 12px;
            background: #081627;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            color: white;
            margin-right: 8px;
            flex: 1;
            outline: none;
        }

        svg#lines {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .flow-line {
            fill: none;
            stroke: rgba(201, 162, 39, 0.1);
            stroke-width: 2;
            transition: 0.5s;
        }

            .flow-line.active {
                stroke: var(--gold);
                opacity: 1;
                filter: drop-shadow(0 0 5px var(--gold));
            }

        /* CART UI */
        .cart-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0b/Phi_Delta_Theta_Crest.png/250px-Phi_Delta_Theta_Crest.png" alt="Crest">
        <h1 id="mainTitle">PHI-GAMES 2026</h1>
        <div class="sub-head">A Philanthropy Event for Phi Delt</div>
    </header>

    <div class="nav-tabs">
        <button id="tab-arena" class="tab-btn tab-active" onclick="showView('arena')">Tournament Arena</button>
        <button id="tab-menu" class="tab-btn tab-inactive" onclick="showView('menu')">The Menu</button>
    </div>

    <div id="arena-view" class="view-section">
        <div class="container">
            <div class="live-feed"><div class="ticker" id="ticker">Waiting for broadcast...</div></div>

            <div class="card">
                <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-top:0;">Sign up your team</h2>
                <div id="reg-ui" style="display:flex; flex-wrap: wrap; gap: 10px;">
                    <input type="text" id="teamName" placeholder="Team Name">
                    <select id="teamSize">
                        <option value="1">1 Player</option>
                        <option value="2">2 Players</option>
                        <option value="3">3 Players</option>
                        <option value="4">4 Players</option>
                        <option value="5">5 Players</option>
                    </select>
                    <div style="display:flex; gap:10px; width:100%;">
                        <button class="primary-btn" style="flex:1;" onclick="buyEntry(10, 'team')">Tournament Only ($10)</button>
                        <button class="primary-btn" style="flex:1; background:#1e3a5f; color:var(--gold);" onclick="buyEntry(15, 'bundle')">Team + Food ($15)</button>
                    </div>
                </div>
                <div id="locked-msg" style="display:none; text-align:center; color:var(--gold);">Registration Closed. Tournament in Session.</div>
            </div>

            <div class="card">
                <div class="donation-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="pulse-dot"></span>
                            <h2 style="font-family: 'Cinzel'; color: var(--gold); margin:0;">Donation Total</h2>
                        </div>
                        <p style="font-size:11px; margin: 4px 0 0; color: #a6851e; font-weight: bold;">SUPPORTING ALS RESEARCH</p>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                        <div style="font-size: 28px; font-weight: bold; color: var(--gold);">$<span id="raised">0</span></div>
                        <button class="primary-btn" style="padding: 8px 16px; font-size: 11px;" onclick="handleDirectDonation()">DONATE ANY AMOUNT</button>
                    </div>
                </div>
                <div class="progress-wrap">
                    <div class="progress-fill" id="goalFill"></div>
                    <div class="progress-text" id="goalText">$0 / $2000 Goal</div>
                </div>
            </div>

            <div class="card bracket-container" id="fsContainer">
                <button class="fs-btn" onclick="toggleFS()">FULL SCREEN</button>
                <div class="bracket" id="root"><svg id="lines"></svg></div>
            </div>
        </div>
    </div>

    <div id="menu-view" class="view-section" style="display: none;">
        <div class="container" style="grid-template-columns: 1fr 350px;">
            <div class="card">
                <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-top:0;">Menu Selection</h2>
                <div id="food-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                </div>
            </div>
            <div class="card">
                <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-top:0;">Your Tray</h2>
                <div id="cart-list" style="min-height: 150px; margin-bottom: 20px;">
                    <p style="opacity:0.3; text-align:center; margin-top: 50px;">Your tray is empty.</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:20px; border-top: 1px solid var(--gold); padding-top:15px;">
                    <span>Total:</span><span>$<span id="cart-total">0.00</span></span>
                </div>
                <button class="primary-btn" style="width:100%; margin-top:20px;" onclick="checkoutCart()">Checkout Items</button>
            </div>
        </div>
    </div>

    <script>const crucible_supabase = supabase.createClient('https://dlrjujkapopwovjqlpew.supabase.co', 'sb_publishable_sABzmRtrGXfuU1gYSxp_TQ_EADV6vwU');
        let LOCKED = false;
        const GOAL = 2000;
        let lastChampion = null;
        let cart = [];

        // MENU DATA
        const menuItems = [
            { id: 'pizza', name: 'Pizza Slice', price: 2.00 },
            { id: 'popsicle', name: 'Popsicle', price: 1.00 },
            { id: 'single', name: 'Single Play', price: 3.00 },
            { id: 'slap', name: 'Slap a Phi', price: 2.00 }
        ];

        // VIEW SWITCHER
        function showView(view) {
            document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
            document.getElementById(view + '-view').style.display = 'block';

            document.getElementById('tab-arena').className = 'tab-btn ' + (view === 'arena' ? 'tab-active' : 'tab-inactive');
            document.getElementById('tab-menu').className = 'tab-btn ' + (view === 'menu' ? 'tab-active' : 'tab-inactive');

            if (view === 'arena') setTimeout(draw, 200);
        }

        // CART LOGIC
        function renderMenu() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = menuItems.map(item => `
            <div class="match" style="width:auto; cursor:default;">
                <div style="color:var(--gold); font-weight:bold;">${item.name}</div>
                <div style="margin:10px 0;">$${item.price.toFixed(2)}</div>
                <button class="primary-btn" style="padding:5px 12px; font-size:11px;" onclick="addToCart('${item.id}')">+ Add</button>
            </div>
        `).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) existing.qty++;
            else cart.push({ ...item, qty: 1 });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('cart-total');
            if (cart.length === 0) {
                list.innerHTML = `<p style="opacity:0.3; text-align:center; margin-top: 50px;">Your tray is empty.</p>`;
                totalDisplay.innerText = "0.00";
                return;
            }
            let total = 0;
            list.innerHTML = cart.map(c => {
                total += (c.price * c.qty);
                return `<div class="cart-item"><span>${c.qty}x ${c.name}</span><span>$${(c.price * c.qty).toFixed(2)}</span></div>`;
            }).join('');
            totalDisplay.innerText = total.toFixed(2);
        }

        // CHECKOUT LOGIC
        async function buyEntry(price, type) {
            const name = document.getElementById("teamName").value;
            const size = document.getElementById("teamSize").value;
            if (!name) return alert("Enter team name.");

            // Calls your resister-team function with a custom price
            const { data } = await crucible_supabase.functions.invoke('resister-team-stripe', {
                body: { teamName: name, teamSize: size, amount: price, type: type }
            });
            if (data?.url) window.location.href = data.url;
        }

        async function checkoutCart() {
            if (cart.length === 0) return alert("Your tray is empty!");
            const { data } = await crucible_supabase.functions.invoke('food-purchase-stripe', { body: { items: cart } });
            if (data?.url) window.location.href = data.url;
        }

        // TOURNAMENT LOGIC (STABLE)
        async function load() {
            const { data } = await crucible_supabase.from('teams').select('*').eq('paid', true).order('created_at', { ascending: true });
            if (data) {
                LOCKED = data.some(t => t.team_name === 'ADMIN_LOCK');
                if (LOCKED) { document.getElementById('reg-ui').style.display = 'none'; document.getElementById('locked-msg').style.display = 'block'; }

                const totalPaid = data.filter(t => t.team_name !== 'ADMIN_LOCK');
                const players = totalPaid.filter(t => t.team_name !== 'DONATION_ONLY');

                let totalRaised = 0;
                totalPaid.forEach(item => { totalRaised += (item.amount) ? parseInt(item.amount) : 10; });

                document.getElementById('raised').innerText = totalRaised;
                document.getElementById('goalFill').style.width = Math.min((totalRaised / GOAL) * 100, 100) + "%";
                document.getElementById('goalText').innerText = `$${totalRaised} / $${GOAL} Goal`;

                if (players.length > 0) {
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    document.getElementById('ticker').innerText = `[LIVE SYNC: ${time}] LATEST ENTRY: ${players[players.length - 1].team_name} joined!`;

                    const size = Math.pow(2, Math.ceil(Math.log2(players.length)));
                    const maxRounds = Math.log2(size);
                    const champion = players.find(p => p.bracket_round === maxRounds);

                    if (champion && champion.team_name !== lastChampion) {
                        lastChampion = champion.team_name;
                        triggerConfetti();
                    }
                    render(players, maxRounds);
                }
            }
        }

        function render(players, rounds) {
            const root = document.getElementById('root');
            const svg = document.getElementById('lines');
            root.innerHTML = ''; root.appendChild(svg);
            const size = Math.pow(2, Math.ceil(Math.log2(players.length)));

            for (let r = 0; r < rounds; r++) {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';
                const mCount = size / Math.pow(2, r + 1);

                for (let m = 0; m < mCount; m++) {
                    const getOccupant = (slot) => {
                        const rangeSize = Math.pow(2, r);
                        const startIdx = (m * 2 + slot) * rangeSize;
                        const endIdx = startIdx + rangeSize - 1;
                        return players.slice(startIdx, endIdx + 1).find(p => p.bracket_round >= r);
                    };
                    const t1 = getOccupant(0), t2 = getOccupant(1);
                    const isBye = (r === 0 && t1 && !t2 && players.length > mCount);

                    roundDiv.innerHTML += `<div class="match" id="r${r}m${m}" style="position:relative;">
                    <div class="team ${t1?.is_loser ? 'loser' : ''} ${t1?.bracket_round > r || isBye ? 'winner-glow' : ''}"
                         onclick="advance(event,'${t1?.team_name}','${t2?.team_name}',${r},${m})">
                         ${t1?.bracket_round >= rounds ? '<div style="position:absolute; top:-25px; left:50%; transform:translateX(-50%); font-size:24px;">👑</div>' : ''}
                         ${t1 ? t1.team_name : (r === 0 ? '---' : 'TBD')} ${isBye ? '(BYE)' : ''}
                         ${t1?.team_size ? `<span class="player-count">${t1.team_size} Players</span>` : ''}
                    </div>
                    <div class="team ${t2?.is_loser ? 'loser' : ''} ${t2?.bracket_round > r ? 'winner-glow' : ''}"
                         onclick="advance(event,'${t2?.team_name}','${t1?.team_name}',${r},${m})">
                         ${t2?.bracket_round >= rounds ? '<div style="position:absolute; top:-25px; left:50%; transform:translateX(-50%); font-size:24px;">👑</div>' : ''}
                         ${t2 ? t2.team_name : (r === 0 ? '---' : 'TBD')}
                         ${t2?.team_size ? `<span class="player-count">${t2.team_size} Players</span>` : ''}
                    </div>
                </div>`;
                }
                root.appendChild(roundDiv);
            }
            setTimeout(draw, 300);
        }

        window.advance = async (e, w, l, r, m) => {
            if (!e.altKey || !w || w === 'undefined') return;
            await crucible_supabase.from('teams').update({ bracket_round: r + 1, bracket_match: Math.floor(m / 2), is_top: (m % 2 === 0), is_loser: false }).eq('team_name', w);
            if (l && l !== 'undefined') await crucible_supabase.from('teams').update({ is_loser: true }).eq('team_name', l);
        };

        window.handleDirectDonation = async () => {
            const amt = prompt("Enter donation ($):", "25");
            if (!amt || isNaN(amt)) return;
            const { data } = await crucible_supabase.functions.invoke('direct-donation', { body: { amount: parseFloat(amt) } });
            if (data?.url) window.location.href = data.url;
        };

        function toggleFS() { const el = document.getElementById('fsContainer'); if (!document.fullscreenElement) el.requestFullscreen(); else document.exitFullscreen(); }
        function triggerConfetti() { const count = 200; const fire = (ratio, opts) => confetti(Object.assign({}, { origin: { y: 0.7 }, colors: ['#c9a227', '#f4f0e6'] }, opts, { particleCount: Math.floor(count * ratio) })); fire(0.25, { spread: 26, startVelocity: 55 }); fire(0.2, { spread: 60 }); fire(0.35, { spread: 100, decay: 0.91 }); }
        function draw() { const svg = document.getElementById('lines'); const root = document.getElementById('root'); if (!svg || !root) return; const cont = root.getBoundingClientRect(); svg.innerHTML = ''; svg.setAttribute('width', root.scrollWidth); svg.setAttribute('height', root.scrollHeight); const rDivs = document.querySelectorAll('.round'); for (let i = 0; i < rDivs.length - 1; i++) { const matches = rDivs[i].querySelectorAll('.match'); const next = rDivs[i + 1].querySelectorAll('.match'); matches.forEach((m, idx) => { const target = next[Math.floor(idx / 2)]; if (!target) return; const b1 = m.getBoundingClientRect(), b2 = target.getBoundingClientRect(); const x1 = b1.right - cont.left, y1 = b1.top + (b1.height / 2) - cont.top; const x2 = b2.left - cont.left, y2 = b2.top + (b2.height / 2) - cont.top; const hasWinner = m.querySelectorAll('.winner-glow').length > 0; const p = document.createElementNS("http://www.w3.org/2000/svg", "path"); p.setAttribute("d", `M ${x1} ${y1} C ${x1 + 40} ${y1}, ${x2 - 40} ${y2}, ${x2} ${y2}`); p.setAttribute("class", "flow-line " + (hasWinner ? "active" : "")); svg.appendChild(p); }); } }

        document.getElementById('mainTitle').addEventListener('click', async (e) => {
            if (!e.altKey) return;
            const p = prompt("Admin Key:");
            if (p === 'reset' && confirm("Wipe DB?")) await crucible_supabase.from('teams').delete().neq('team_name', 'VOID');
            if (p === 'phi2026') await crucible_supabase.from('teams').insert([{ team_name: 'ADMIN_LOCK', paid: true }]);
            location.reload();
        });

        window.onload = () => { load(); renderMenu(); }; window.onresize = draw;
        crucible_supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'teams' }, load).subscribe();</script>
</body>
</html>
